<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Job Search Personalizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="auth-split-layout">
        
        <!-- Left Side: Grand Visual Banner -->
        <div class="auth-banner">
            <div class="banner-content">
                <div class="icon-circle banner-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                </div>
                <h2>Your personalized career journey begins here.</h2>
                <p>Create an account to upload your resume and unlock instant access to AI-ranked job posting documents.</p>
            </div>
        </div>

        <!-- Right Side: Clean Sign Up Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <h1 class="auth-title align-left">Create an Account</h1>
                <p class="auth-subtitle">Join us to start personalizing your search.</p>
                
                <form id="signup-form">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Jane Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="student@university.edu" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create a strong password" required>
                    </div>
                    
                    <button type="submit" class="primary-btn btn-block" style="margin-top: 2rem;">Sign Up</button>
                </form>
                
                <p class="auth-footer-text align-left">
                    Already have an account? <a href="login.html" class="text-link">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Dummy routing script -->
    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            alert("Account created successfully! Please sign in to continue.");
            window.location.href = 'login.html'; 
        });
    </script>
</body>
</html>
