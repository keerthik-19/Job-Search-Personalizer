<!-- 
  ========================================================
  JOB SEARCH PERSONALIZER - FRONTEND
  This HTML file provides the structure for the app.
  It is designed to cleanly separate the "Query" (Resume)
  from the "Results" (Job Matches).
  ======================================================== 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Search Personalizer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <!-- The main container holding our entire application -->
    <div class="app-container">
        
        <!-- HEADER: Title and short description of our tool -->
        <header class="app-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>Job Search Personalizer</h1>
                <p>Paste your resume to receive personalized job recommendations based on similarity matching.</p>
            </div>
            <a href="login.html" class="primary-btn" style="background-color: transparent; border: 1px solid var(--accent-peach); color: var(--accent-peach); text-decoration: none; padding: 0.5rem 1.5rem; font-size: 1rem;">Sign Out</a>
        </header>

        <!-- MAIN GRID: This divides our screen into two equal columns -->
        <main class="dashboard-grid">
            
            <!-- COLUMN 1: The Input Panel (Query) -->
            <section class="panel input-panel">
                <div class="panel-header">
                    <!-- A decorative SVG icon matching our presentation theme -->
                    <div class="icon-circle">
                         <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                        <h2>Resume Input</h2>
                        <button type="button" id="upload-file-btn" class="primary-btn" style="padding: 0.4rem 1rem; font-size: 0.9rem; background-color: rgba(244, 237, 230, 0.05); border: 1px solid rgba(244, 237, 230, 0.3); color: var(--text-light); min-width: auto; cursor: pointer;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px; vertical-align: middle;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            Upload File
                        </button>
                        <input type="file" id="file-input" accept=".txt,.pdf,.docx,.doc" style="display: none;">
                    </div>
                </div>
                
                <!-- The text area where users actually paste their resume -->
                <div class="panel-body">
                    <textarea id="resume-input" placeholder="Paste your raw resume text here..."></textarea>
                </div>
                
                <!-- The submit area containing our primary button -->
                <div class="panel-footer">
                    <button id="find-jobs-btn" class="primary-btn">
                        <!-- We separate the text and the loader so we can hide/show them in Javascript -->
                        <span class="btn-text">Find Jobs</span>
                        <span class="loader hidden"></span>
                    </button>
                </div>
            </section>

            <!-- COLUMN 2: The Results Panel (Ranked Recommendations) -->
            <section class="panel results-panel">
                <div class="panel-header">
                    <!-- Target icon representing matching/accuracy -->
                    <div class="icon-circle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                    </div>
                    <h2>Ranked Documents</h2>
                </div>
                
                <div class="panel-body">
                    <!-- Added Search Bar -->
                    <div style="margin-bottom: 1.5rem; position: relative;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" placeholder="Search direct job titles..." style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; background: rgba(244,237,230,0.05); border: 1px solid rgba(244, 237, 230, 0.2); border-radius: 4px; color: var(--text-light); font-family: var(--font-serif); font-size: 1rem; outline: none;">
                    </div>
                    <!-- This placeholder text shows BEFORE the user clicks "Find Jobs" -->
                    <div id="results-placeholder" class="placeholder-state">
                        <p>Awaiting input document...</p>
                    </div>
                    
                    <!-- This hidden list will be populated with job cards via JavaScript -->
                    <div id="job-results" class="job-list hidden">
                        <!-- Javascript will insert HTML here! -->
                    </div>
                </div>
            </section>
            
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
        // Point PDF.js at its CDN worker so it doesn't look for a local file
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
    <script src="script.js?v=6"></script>
</body>
</html>
