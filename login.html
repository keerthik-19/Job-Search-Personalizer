<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Job Search Personalizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="auth-split-layout">
        
        <!-- Left Side: Grand Visual Banner -->
        <div class="auth-banner">
            <div class="banner-content">
                <div class="icon-circle banner-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <h2>Stop scrolling.<br>Start matching.</h2>
                <p>Job searching is time-consuming and inefficient. We use NLP to match your actual skills to the roles that need them.</p>
            </div>
        </div>

        <!-- Right Side: Clean Login Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <h1 class="auth-title align-left">Welcome Back</h1>
                <p class="auth-subtitle">Please enter your details to sign in.</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="student@university.edu" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="auth-actions">
                        <label class="remember-me"><input type="checkbox"> Remember me</label>
                        <a href="#" class="text-link">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="primary-btn btn-block">Sign In</button>
                </form>
                
                <p class="auth-footer-text align-left">
                    Don't have an account? <a href="signup.html" class="text-link">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <!-- handle pseudo login for presentation demo -->
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            // no real backend yet, just redirecting to main view for demo route
            window.location.href = 'dashboard.html'; 
        });
    </script>
</body>
</html>
